<div class="item-list-container">
  <header class="section-header">
    <h2>INVENTORY & ITEMS</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH ITEMS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW ITEM ]</button>
    </div>
  </header>

  <div class="item-grid">
    <div *ngFor="let item of filteredItems" class="item-card" (click)="openItem(item.id)">
      <div class="item-meta">
        <span class="item-value">{{ item.value }} GP</span>
      </div>
      <h3>{{ item.name }}</h3>
      <button class="context-btn" (click)="openInContext($event, item)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredItems.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW ITEM" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>ITEM NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter item name...">
  </div>
  <div class="hakari-form-group">
    <label>VALUE (GOLD)</label>
    <input type="number" class="hakari-input" [(ngModel)]="formData.value" placeholder="0">
  </div>
</app-modal>
