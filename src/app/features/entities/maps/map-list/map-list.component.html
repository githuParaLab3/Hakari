<div class="map-list-container">
  <header class="section-header">
    <h2>MAPS & CARTOGRAPHY</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH MAPS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW MAP ]</button>
    </div>
  </header>

  <div class="map-grid">
    <div *ngFor="let map of filteredMaps" class="map-card" (click)="openMap(map.id)">
      <div class="map-meta">
        <span>{{ map.type }}</span>
      </div>
      <h3>{{ map.name }}</h3>
      <button class="context-btn" (click)="openInContext($event, map)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredMaps.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW MAP" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>MAP NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter map name...">
  </div>
  <div class="hakari-form-group">
    <label>TYPE</label>
    <select class="hakari-input" [(ngModel)]="formData.type">
      <option value="Regional">Regional</option>
      <option value="Dungeon">Dungeon</option>
      <option value="City">City</option>
      <option value="Battlemap">Battlemap</option>
    </select>
  </div>
</app-modal>
