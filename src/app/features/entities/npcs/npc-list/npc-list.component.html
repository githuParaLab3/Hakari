<div class="npc-list-container">
  <header class="section-header">
    <h2>NON-PLAYER CHARACTERS</h2>
    <button class="action-btn" (click)="openModal()">[ + NEW NPC ]</button>
  </header>

  <div class="npc-grid">
    <div *ngFor="let npc of npcs" class="npc-card" (click)="openNpc(npc.id)">
      <div class="npc-meta">
        <span class="npc-role">{{ npc.role }}</span>
        <span class="npc-status" *ngIf="npc.status">{{ npc.status }}</span>
      </div>
      <h3>{{ npc.name }}</h3>
      <span class="enemy-badge" *ngIf="npc.is_enemy">HOSTILE</span>
      <button class="context-btn" (click)="openInContext($event, npc)">[ CONTEXT ]</button>
    </div>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW NPC" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>NPC NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter name...">
  </div>
  <div class="hakari-form-group">
    <label>ROLE / TITLE</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.role" placeholder="e.g. Merchant, Villain...">
  </div>
</app-modal>
