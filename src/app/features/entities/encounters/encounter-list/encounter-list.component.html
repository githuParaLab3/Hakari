<div class="encounter-list-container">
  <header class="section-header">
    <h2>ENCOUNTERS</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH ENCOUNTERS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW ENCOUNTER ]</button>
    </div>
  </header>

  <div class="encounter-grid">
    <div *ngFor="let encounter of filteredEncounters" class="encounter-card" (click)="openEncounter(encounter.id)">
      <div class="encounter-meta">
        <span class="encounter-difficulty">{{ encounter.difficulty }}</span>
      </div>
      <h3>{{ encounter.name }}</h3>
      <button class="context-btn" (click)="openInContext($event, encounter)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredEncounters.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW ENCOUNTER" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>ENCOUNTER NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter encounter name...">
  </div>
  <div class="hakari-form-group">
    <label>DIFFICULTY</label>
    <select class="hakari-input" [(ngModel)]="formData.difficulty">
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
      <option value="Deadly">Deadly</option>
    </select>
  </div>
</app-modal>
