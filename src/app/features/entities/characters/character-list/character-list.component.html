<div class="character-list-container">
  <header class="section-header">
    <h2>PLAYER CHARACTERS</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH CHARACTERS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW CHARACTER ]</button>
    </div>
  </header>

  <div class="character-grid">
    <div *ngFor="let character of filteredCharacters" class="character-card" (click)="openCharacter(character.id)">
      <div class="character-meta">
        <span class="character-class">{{ character.class }}</span>
        <span class="character-level" *ngIf="character.level">LVL {{ character.level }}</span>
      </div>
      <h3>{{ character.name }}</h3>
      <button class="context-btn" (click)="openInContext($event, character)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredCharacters.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW CHARACTER" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>CHARACTER NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter name...">
  </div>
  <div class="hakari-form-group">
    <label>CLASS</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.charClass" placeholder="e.g. Wizard, Fighter...">
  </div>
</app-modal>
