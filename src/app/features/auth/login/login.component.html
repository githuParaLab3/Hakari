<div class="login-layout">
  <header class="login-topbar">
    <div class="brand-box" style="cursor: pointer;" routerLink="/">
      <span class="brand-kanji">計</span>
      <span class="brand-text">HAKARI</span>
    </div>
    <button class="icon-btn" (click)="themeService.toggleTheme()">
      <span class="material-symbols-outlined">
        {{ themeService.isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>
  </header>

  <main class="login-content">
    <div class="login-card">
      <div class="card-header">
        <h1>Welcome</h1>
        <p>Log in or create an account to access the system.</p>
      </div>

      <div class="card-body">
        <button class="btn-primary" (click)="login()" [disabled]="loading">
          <span class="material-symbols-outlined" *ngIf="!loading">login</span>
          <span *ngIf="!loading">Sign in with Google</span>
          <span *ngIf="loading">Signing in...</span>
        </button>
        
        <div class="error-msg" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>
      </div>
    </div>
  </main>
</div>
