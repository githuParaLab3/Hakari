<div class="note-list-container">
  <header class="section-header">
    <h2>KNOWLEDGE BASE</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH NOTES..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW NOTE ]</button>
    </div>
  </header>

  <div class="note-grid">
    <div *ngFor="let note of filteredNotes" class="note-card" (click)="openNote(note.id)">
      <div class="note-meta">
        <span class="note-type">{{ note.type }}</span>
        <span class="note-date">{{ note.updated_at | date:'shortDate' }}</span>
      </div>
      <h3>{{ note.title }}</h3>
      <button class="context-btn" (click)="openInContext($event, note)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredNotes.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW NOTE" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>TITLE</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.title" placeholder="Enter title...">
  </div>
  <div class="hakari-form-group">
    <label>TYPE</label>
    <select class="hakari-input" [(ngModel)]="formData.type">
      <option value="lore">Lore</option>
      <option value="event">Event</option>
      <option value="consequence">Consequence</option>
      <option value="idea">Idea</option>
    </select>
  </div>
</app-modal>
