<div class="dashboard-container">
  <header class="dashboard-header">
    <h2>SELECT CAMPAIGN</h2>
    <button class="action-btn" (click)="createNewCampaign()">[ + NEW CAMPAIGN ]</button>
  </header>

  <div class="campaign-grid">
    <div *ngFor="let campaign of campaigns" class="campaign-card" (click)="openCampaign(campaign.id)">
      <h3>{{ campaign.name }}</h3>
      <p>{{ campaign.description }}</p>
      <span class="date">{{ campaign.created_at | date:'shortDate' }}</span>
    </div>
  </div>
</div>
