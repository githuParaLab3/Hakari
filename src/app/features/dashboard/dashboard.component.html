<div class="page-container">
  <div class="page-header">
    <h2>Select Campaign</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH CAMPAIGNS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="btn-primary" (click)="openModal()">
        <span class="material-symbols-outlined">add</span>
        New Campaign
      </button>
    </div>
  </div>

  <div class="campaign-grid">
    <div *ngFor="let campaign of filteredCampaigns" class="hakari-card campaign-card" (click)="openCampaign(campaign.id)">
      <h3 class="campaign-title">{{ campaign.name }}</h3>
      <p class="campaign-desc">{{ campaign.description }}</p>
      <span class="campaign-date">{{ campaign.created_at | date:'shortDate' }}</span>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredCampaigns.length === 0">
    <span class="material-symbols-outlined">folder_off</span>
    <p>No campaigns found.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW CAMPAIGN" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>CAMPAIGN NAME</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.name" placeholder="Enter campaign name...">
  </div>
  <div class="hakari-form-group">
    <label>DESCRIPTION</label>
    <textarea class="hakari-input" [(ngModel)]="formData.description" placeholder="Brief description..."></textarea>
  </div>
</app-modal>
