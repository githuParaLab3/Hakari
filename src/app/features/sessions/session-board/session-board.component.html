<div class="board-container">
  <div class="board-toolbar">
    <button class="action-btn" (click)="openModal()">[ + ADD NODE ]</button>
  </div>
  <div class="board-canvas">
    <div 
      class="board-node" 
      *ngFor="let node of nodes" 
      [style.left.px]="node.pos_x" 
      [style.top.px]="node.pos_y"
      (mousedown)="onMouseDown($event, node)">
      {{ node.title }}
    </div>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW NODE" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>NODE TITLE</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.title" placeholder="Enter node title...">
  </div>
</app-modal>
