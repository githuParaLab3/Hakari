<div class="session-list-container">
  <header class="section-header">
    <h2>SESSION LOGS</h2>
    <button class="action-btn" (click)="openModal()">[ + NEW SESSION ]</button>
  </header>

  <div class="session-grid">
    <div *ngFor="let session of sessions" class="session-card" (click)="openSession(session.id)">
      <div class="session-meta">
        <span class="session-number">#{{ session.number }}</span>
      </div>
      <h3>{{ session.title }}</h3>
      <p class="session-summary">{{ session.summary }}</p>
    </div>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW SESSION" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>SESSION TITLE</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.title" placeholder="Enter session title...">
  </div>
  <div class="hakari-form-group">
    <label>SHORT SUMMARY</label>
    <textarea class="hakari-input" [(ngModel)]="formData.summary" placeholder="Brief context..."></textarea>
  </div>
</app-modal>
