<div class="resource-list-container">
  <header class="section-header">
    <h2>EXTERNAL RESOURCES</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH RESOURCES..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="openModal()">[ + NEW RESOURCE ]</button>
    </div>
  </header>

  <div class="resource-grid">
    <div *ngFor="let resource of filteredResources" class="resource-card" (click)="openResource(resource.id)">
      <div class="resource-meta">
        <span>{{ resource.type }}</span>
      </div>
      <h3>{{ resource.title }}</h3>
      <button class="context-btn" (click)="openInContext($event, resource)">[ CONTEXT ]</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredResources.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>

<app-modal *ngIf="isModalOpen" title="NEW RESOURCE" (close)="closeModal()" (confirm)="confirmModal()">
  <div class="hakari-form-group">
    <label>RESOURCE TITLE</label>
    <input type="text" class="hakari-input" [(ngModel)]="formData.title" placeholder="Enter resource title...">
  </div>
  <div class="hakari-form-group">
    <label>TYPE</label>
    <select class="hakari-input" [(ngModel)]="formData.type">
      <option value="URL">URL Link</option>
      <option value="PDF">PDF Document</option>
      <option value="Image">Image</option>
    </select>
  </div>
</app-modal>
