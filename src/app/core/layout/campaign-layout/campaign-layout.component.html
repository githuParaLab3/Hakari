<div class="campaign-wrapper">
  <aside class="sidebar">
    <div class="brand">THREAD</div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" class="nav-item">Dashboard</a>
      <a routerLink="./" class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="sessions" class="nav-item" routerLinkActive="active">Sessions</a>
      <a routerLink="notes" class="nav-item" routerLinkActive="active">Notes</a>
      <a routerLink="npcs" class="nav-item" routerLinkActive="active">NPCs</a>
      <a routerLink="locations" class="nav-item" routerLinkActive="active">Locations</a>
      <a routerLink="items" class="nav-item" routerLinkActive="active">Items</a>
      <a routerLink="characters" class="nav-item" routerLinkActive="active">Characters</a>
      <a routerLink="encounters" class="nav-item" routerLinkActive="active">Encounters</a>
      <a routerLink="monsters" class="nav-item" routerLinkActive="active">Monsters</a>
      <a routerLink="maps" class="nav-item" routerLinkActive="active">Maps</a>
      <a routerLink="resources" class="nav-item" routerLinkActive="active">Resources</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="action-btn" (click)="toggleSidePanel()">[ PANEL ]</button>
    </header>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

  <aside class="side-panel" [class.open]="isSidePanelOpen">
    <div class="panel-header">CONTEXT MANAGER</div>
    <div class="panel-content">
      <ng-content select="[side-panel-content]"></ng-content>
    </div>
  </aside>
</div>
